name: jibu_kenya
description: A digital civic infrastructure reporting and accountability platform for Kenya.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.9.2

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^10.3.1

  # Local Preferences
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6
  share_plus: ^13.1.0

  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  geolocator: ^13.0.1
  fl_chart: ^0.69.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1


flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0F4C5C"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true